<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Inventario · Piazza Pasticcio</title>
<script>
// Chrome captura el <link rel=manifest> al parsear la página; cambiarle el
// href con JS después NO cambia la identidad de la app que se instala (por
// eso instalar ?centro=UH daba la app de Piazza). El link correcto tiene que
// emitirse aquí mismo, antes de que exista cualquier <link>.
(function(){
  var uh = location.pathname.indexOf('/inventario-uh/') !== -1 ||
           (new URLSearchParams(location.search).get('centro') || '').toUpperCase() === 'UH';
  var pre = uh ? 'branding/icon-uh-' : 'branding/icon-';
  document.write(
    '<link rel="icon" type="image/png" href="' + pre + '192.png" id="favicon">' +
    '<link rel="apple-touch-icon" href="' + pre + '180.png" id="touch-icon">' +
    '<link rel="manifest" href="' + (uh ? 'manifest-uh' : 'manifest') + '.webmanifest" id="manifest-link">' +
    '<meta name="theme-color" content="' + (uh ? '#111827' : '#667eea') + '">'
  );
})();
</script>
<style>
@font-face{font-family:'Brand';font-weight:400;src:url(branding/fonts/FreightNeo%20W03%20Book.ttf)format('truetype')}
@font-face{font-family:'BrandScript';font-weight:900;src:url(branding/fonts/TT%20Nooks%20Script%20Black.otf)format('opentype')}
:root{
  --brand-green:#2f3e1e;--brand-wine:#9b1e21;--brand-bone:#eee3ca;
  --brand-yellow:#efa91e;--brand-ink:#1f2916;--brand-paper:#fffdf8;
  --brand-border:rgba(47,62,30,0.14);--brand-muted:rgba(47,62,30,0.52);
  --brand-shadow:0 18px 48px rgba(47,62,30,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Brand','Avenir Next','Segoe UI',serif;background:linear-gradient(180deg,#f8f4ea 0%,#fffdf8 28%,#f4f5f0 100%);color:var(--brand-ink);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.hdr{color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.hdr h1{font-size:17px;font-weight:700;flex:1}
.hdr-back{background:none;border:none;color:white;font-size:22px;padding:0 6px;cursor:pointer;line-height:1}
button{cursor:pointer;border:none;font-family:inherit;font-weight:600;border-radius:10px;transition:opacity .15s}
button:active{opacity:.75}
.btn{display:block;width:100%;padding:15px;font-size:16px;border-radius:12px;text-align:center}
.btn-primary{background:var(--color,#667eea);color:white}
.btn-green{background:#22c55e;color:white}
.btn-gray{background:#e5e7eb;color:#374151}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
.zone-done-banner{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.4}
.zone-done-banner strong{display:block;margin-bottom:2px}
.correction-badge{display:inline-block;margin-top:4px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:700}
.form-group{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
input[type=text],input[type=date],select{width:100%;padding:13px 14px;border:1px solid rgba(47,62,30,.16);border-radius:10px;font-size:16px;font-family:inherit;background:rgba(255,253,248,.82);color:var(--brand-green);-webkit-appearance:none;appearance:none}
input:focus,select:focus{outline:none;border-color:var(--color,#667eea)}
.content{flex:1;padding:16px;overflow-y:auto}
.card{background:var(--brand-paper);background:color-mix(in srgb,var(--brand-paper) 94%,white);border:1px solid var(--brand-border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 14px 36px rgba(47,62,30,.06)}
.divider{height:1px;background:var(--brand-border);margin:16px 0}
.section-label{font-size:11px;font-weight:700;color:var(--brand-muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 8px}
.row{display:flex;gap:8px;margin-top:10px}
.progress-bar{height:4px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin:4px 0 0}
.progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .3s}
.zone-card{background:var(--brand-paper);background:color-mix(in srgb,var(--brand-paper) 94%,white);border:1px solid var(--brand-border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(47,62,30,.05);cursor:pointer;border-left:4px solid var(--brand-border)}
.zone-card:active{opacity:.8}
.zone-card.done{border-left-color:#22c55e}
.zone-card.partial{border-left-color:#f59e0b}
.zone-card.corrected{border-left-color:#facc15;background:#fffbeb}
.zone-card.locked{border-left-color:#94a3b8;cursor:not-allowed;opacity:.6}
.zone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zone-info{flex:1;min-width:0}
.zone-name{font-weight:700;font-size:15px}
.zone-meta{font-size:12px;color:#888;margin-top:2px}
.zone-status{font-size:20px}
.subgrupo-hdr{font-size:11px;font-weight:700;color:var(--brand-muted);text-transform:uppercase;letter-spacing:1px;padding:10px 16px 4px;background:rgba(47,62,30,.04)}
.subgrupo-hdr.hidden{display:none}
.item-row{background:var(--brand-paper);padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brand-border)}
.item-row.corrected{background:#fffbeb}
.item-row.hidden{display:none}
.item-row.search-match{border-left:3px solid var(--color,#667eea);padding-left:13px}
.item-row.search-match .item-name{color:#1e293b}
mark{background:#fef08a;border-radius:3px;padding:0 2px;font-style:normal}
.item-text{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600}
.item-unit{font-size:11px;color:#aaa;margin-top:2px}
.item-unit.warn{color:#d97706}
.qty-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qty-input{width:72px;padding:10px 6px;border:1.5px solid #ddd;border-radius:8px;text-align:center;font-size:16px;font-weight:700;font-family:inherit;-webkit-appearance:none;appearance:none}
.qty-input:focus{outline:none;border-color:var(--color,#667eea);background:#f5f3ff}
.qty-input.filled{border-color:#22c55e;background:#f0fff4}
.qty-label{font-size:11px;color:#aaa;white-space:nowrap}
.lt-badge{font-size:11px;font-weight:700;color:var(--color,#667eea);background:#ede9fe;padding:2px 6px;border-radius:6px;white-space:nowrap;min-width:54px;text-align:right}
.pres-sel{font-size:12px;border:1px solid #ddd;border-radius:6px;padding:3px 6px;background:white;color:#333;max-width:110px}
.search-bar{background:rgba(255,253,248,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:10px 16px;border-bottom:1px solid var(--brand-border);display:flex;gap:8px;position:sticky;top:53px;z-index:40}
.search-bar input{flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit}
.search-bar input:focus{outline:none;border-color:var(--color,#667eea)}
.search-bar button{background:#f3f4f6;color:#555;padding:10px 14px;border-radius:10px;font-size:14px}
.fab-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(255,253,248,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--brand-border);z-index:50;display:flex;gap:8px}
.alert{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.4}
.alert-warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.alert-error{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.alert-ok{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
.alert-title{font-weight:700;margin-bottom:4px}
/* Area selector */
.area-list{padding:0 16px 16px}
.area-item{background:var(--brand-paper);background:color-mix(in srgb,var(--brand-paper) 94%,white);border:1px solid var(--brand-border);padding:16px;display:flex;align-items:center;gap:14px;border-radius:12px;margin-bottom:8px;box-shadow:0 4px 14px rgba(47,62,30,.05);cursor:pointer;border-left:4px solid var(--ac,#667eea);transition:opacity .15s}
.area-item:active{opacity:.75}
.area-item-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:800;flex-shrink:0}
.area-item-info{flex:1;min-width:0}
.area-item-name{font-size:15px;font-weight:700;color:#111}
.area-item-sub{font-size:12px;color:#888;margin-top:2px}
.area-item-arrow{color:#c4c4c4;font-size:18px;flex-shrink:0}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:white;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;color:#999;padding:0;margin-top:-4px}
/* Supervisor */
.sup-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);color:#6d28d9;border-radius:20px;padding:3px 10px 3px 8px;font-size:12px;font-weight:700;cursor:pointer}
.sup-badge:hover{background:rgba(124,58,237,.2)}
.comment-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px;opacity:.45;line-height:1;flex-shrink:0}
.comment-btn.has-comment{opacity:1;color:#7c3aed}
.comment-btn:hover{opacity:1}
.item-comment-text{font-size:11px;color:#7c3aed;margin-top:2px;font-style:italic}
/* Welcome */
.welcome-hero{background:rgba(255,253,248,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--brand-border);padding:20px 16px 16px;display:flex;align-items:center;gap:14px}
.welcome-logo-img{width:48px;height:48px;object-fit:contain;border-radius:10px;border:1px solid rgba(155,30,33,.14);background:rgba(255,253,248,.7);padding:5px;flex-shrink:0}
.welcome-logo-text{}
.welcome-logo-name{font-family:'BrandScript',cursive;font-size:24px;line-height:1;color:var(--brand-wine)}
.welcome-logo-sub{font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--brand-green);margin-top:2px}
.welcome-hero p{display:none}
.ic{display:inline-block;vertical-align:-3px;flex:none}
</style>
</head>

<!-- PANTALLA: selector de área -->
<div id="screen-welcome" class="screen">
  <div class="welcome-hero">
    <img class="welcome-logo-img" src="branding/logo.png" alt="Piazza Pasticcio">
    <div class="welcome-logo-text" style="flex:1;min-width:0">
      <div class="welcome-logo-name">Piazza Pasticcio</div>
      <div class="welcome-logo-sub" id="welcome-sub">Inventarios · selecciona el almacén</div>
    </div>
    <div id="sup-badge-wrap"></div>
  </div>
  <div id="welcome-body" class="content" style="padding-top:0"></div>
</div>

<!-- PANTALLA: nueva sesión -->
<div id="screen-session" class="screen">
  <div class="hdr" id="session-hdr">
    <button class="hdr-back" onclick="go('welcome')">←</button>
    <h1>Nueva toma</h1>
  </div>
  <div class="content">
    <div class="form-group">
      <label>Operario</label>
      <input type="text" id="inp-operario" placeholder="Tu nombre">
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="inp-fecha">
    </div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="startSession()">Iniciar →</button>
  </div>
</div>

<!-- PANTALLA: resumen de zonas -->
<div id="screen-overview" class="screen">
  <div class="hdr" id="ov-hdr">
    <button class="hdr-back" onclick="go('welcome')">←</button>
    <h1 id="ov-title">Toma de inventario</h1>
  </div>
  <div class="content">
    <div id="ov-meta" style="font-size:13px;color:#888;margin-bottom:4px"></div>
    <div id="ov-warn" style="margin-bottom:8px"></div>
    <div id="ov-feedback"></div>
    <div style="margin-bottom:16px"><div class="progress-bar"><div class="progress-fill" id="ov-bar" style="width:0%"></div></div></div>
    <div id="ov-zones"></div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="btn-generate" onclick="go('generate')">Ver resumen →</button>
    </div>
  </div>
</div>

<!-- PANTALLA: conteo -->
<div id="screen-count" class="screen">
  <div class="hdr" id="count-hdr">
    <button class="hdr-back" onclick="exitCount()">←</button>
    <div style="flex:1;min-width:0">
      <h1 id="count-zone-name">Conteo</h1>
      <div class="progress-bar"><div class="progress-fill" id="count-bar" style="width:0%"></div></div>
    </div>
    <span id="count-pct" style="font-size:13px;white-space:nowrap;opacity:.85"></span>
  </div>
  <div class="search-bar">
    <input type="text" id="count-search" placeholder="Buscar artículo…" oninput="filterCount(this.value)">
    <button onclick="clearSearch()">✕</button>
  </div>
  <div id="count-list" style="padding-bottom:90px"></div>
  <div class="fab-bar">
    <button class="btn btn-green" style="flex:2" onclick="doneZone()">Cerrar zona ✓</button>
    <button class="btn btn-gray btn-sm" style="flex:1" onclick="openManualModal()">+ No catalogado</button>
    <button class="btn btn-gray btn-sm" id="btn-ver-manuales" style="flex:1;display:none" onclick="openManualesLista()"><svg class="ic" width="16" height="16"><use href="#i-clipboard-list"/></svg> <span id="manuales-count-badge">0</span></button>
  </div>
</div>

<!-- PANTALLA: resumen de toma (solo lectura) -->
<div id="screen-generate" class="screen">
  <div class="hdr" id="gen-hdr">
    <button class="hdr-back" onclick="go('overview')">←</button>
    <h1>Resumen de toma</h1>
  </div>
  <div class="content">
    <div id="validation-out"></div>
    <div class="alert alert-info" style="margin-top:16px">
      <div class="alert-title"><svg class="ic" width="15" height="15"><use href="#i-upload"/></svg> Exportación desde Admin</div>
      El Excel y el envío a Sheets se generan desde <strong>admin.html</strong> una vez que el equipo termine de contar.
    </div>
  </div>
</div>

<!-- MODAL: ítem no catalogado -->
<div id="modal-manual" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeManualModal()">✕</button>
    <div class="modal-title" id="man-modal-title">Ítem no catalogado</div>
    <input type="hidden" id="man-edit-id">
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="man-nombre" placeholder="Ej: Herradura Reposado" list="manual-template-list" oninput="updateManualTemplateHint()">
      <datalist id="manual-template-list"></datalist>
      <div id="man-template-hint" style="font-size:12px;color:#64748b;margin-top:4px"></div>
    </div>
    <div class="row">
      <div class="form-group" style="flex:1">
        <label id="man-cantidad-label">Cantidad *</label>
        <input type="number" id="man-cantidad" inputmode="decimal" step="0.01" min="0" placeholder="0">
      </div>
      <div class="form-group" style="flex:1">
        <label>Unidad base</label>
        <input type="text" id="man-unidad" placeholder="KG, LT, PZA…">
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="man-pres-toggle" onchange="toggleManualPres(this.checked)" style="width:18px;height:18px">
        Tiene presentación (botella, caja, paquete…)
      </label>
    </div>
    <div id="man-pres-block" style="display:none;background:#f5f3ff;border-radius:8px;padding:12px;margin-bottom:12px">
      <div class="row">
        <div class="form-group" style="flex:1">
          <label>Nombre presentación</label>
          <input type="text" id="man-pres-nombre" placeholder="Ej: BOTELLA 750ml" oninput="updateManualCantidadLabel()">
        </div>
        <div class="form-group" style="flex:1">
          <label>Factor (LT/KG por unidad)</label>
          <input type="number" id="man-pres-factor" inputmode="decimal" step="0.001" min="0.001" placeholder="0.75" oninput="updateManualCantidadLabel()">
        </div>
      </div>
      <div id="man-pres-hint" style="font-size:12px;color:#7c3aed;margin-top:4px"></div>
    </div>
    <div class="form-group">
      <label>Foto (opcional)</label>
      <input type="file" id="man-foto" accept="image/*" capture="environment" onchange="previewFoto(this)" style="font-size:14px;padding:8px 0">
      <div id="man-foto-preview" style="margin-top:8px"></div>
    </div>
    <button class="btn btn-primary" onclick="saveManual()">Guardar</button>
  </div>
</div>

<!-- MODAL: login supervisor -->
<div id="modal-supervisor-login" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('modal-supervisor-login').classList.remove('active')">✕</button>
    <div class="modal-title">Modo supervisor</div>
    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="sup-nombre" placeholder="Ej: Pablo" autocomplete="name">
    </div>
    <div class="form-group">
      <label>PIN de supervisor</label>
      <input type="password" id="sup-pin" inputmode="numeric" placeholder="••••••" onkeyup="if(event.key==='Enter')loginSupervisor()">
    </div>
    <div id="sup-login-error" style="color:#dc2626;font-size:13px;margin-bottom:8px;display:none"></div>
    <button class="btn btn-primary" onclick="loginSupervisor()">Activar modo supervisor</button>
  </div>
</div>

<!-- MODAL: comentario de supervisor -->
<div id="modal-comment" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('modal-comment').classList.remove('active')">✕</button>
    <div class="modal-title" id="comment-modal-title">Comentario</div>
    <textarea id="comment-text" rows="4" style="width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px;font-size:15px;font-family:inherit;resize:vertical" placeholder="Ej: Stock físico difiere, revisar con proveedor…"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" style="flex:1" onclick="saveComment()">Guardar</button>
      <button class="btn btn-gray" id="btn-delete-comment" style="flex:0;display:none" onclick="deleteComment()">Borrar</button>
    </div>
  </div>
</div>

<!-- MODAL: lista de no catalogados -->
<div id="modal-manuales-lista" class="modal-overlay">
  <div class="modal-box" style="max-height:85vh;overflow-y:auto">
    <button class="modal-close" onclick="document.getElementById('modal-manuales-lista').classList.remove('active')">✕</button>
    <div class="modal-title">Mis no catalogados</div>
    <div id="manuales-lista-body"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="document.getElementById('modal-manuales-lista').classList.remove('active');openManualModal()">+ Agregar nuevo</button>
  </div>
</div>

function getDeviceId() {
  let id = localStorage.getItem('inv_device_id');
  if (!id) { id = Date.now().toString(36) + Math.random().toString(36).slice(2); localStorage.setItem('inv_device_id', id); }
  return id;
}
// Conteo colaborativo: cada dispositivo escribe a su propia clave "zoneIdx:deviceId"
// El Worker hace merge clave por clave → no hay conflictos aunque dos personas cuenten la misma zona
function myZoneKey(zoneIdx) { return zoneIdx + ':' + getDeviceId(); }
function baseZone(key) { return parseInt(key); } // parseInt se detiene en ':' — extrae el índice de zona

function newManualId() {
  return getDeviceId() + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6);
}

function normalizeSesion(d) {
  return {
    operario:d.operario,
    fecha:d.fecha,
    templateHash:d.templateHash||'',
    countsByZone:d.countsByZone||{},
    presChoiceByZone:d.presChoiceByZone||{},
    correctionsByZone:d.correctionsByZone||{},
    completedZones:d.completedZones||[],
    manuales:d.manuales||[],
    lockedZones:d.lockedZones||{},
    reopenedZones:d.reopenedZones||{},
    pendingCompletedZoneRemovals:d.pendingCompletedZoneRemovals||[],
    zoneConfigId:d.zoneConfigId||'',
    zoneSnapshot:(d.zoneSnapshot && d.zoneSnapshot.length) ? d.zoneSnapshot : null,
    snapshotSynced:true // viene del servidor: no re-enviar (y si es null, no inventarle uno)
  };
}

function countedCodCount(sesion) {
  const cods = new Set();
  Object.values(sesion?.countsByZone || {}).forEach(zoneCounts => {
    Object.keys(zoneCounts || {}).forEach(cod => cods.add(cod));
  });
  return cods.size;
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

// ── Worker sync ────────────────────────────────────────────────────────────

async function fetchPlantillaWorker() {
  try {
    const r = await fetch(WORKER_URL + '/inv/plantilla?almacen=' + ALMACEN);
    if (!r.ok) return false;
    const d = await r.json();
    if (!d.ok || !d.found) return false;
    T = { rowMap: d.rowMap, cantidadColIdx: d.cantidadColIdx, presMap: d.presMap || {}, unitMap: d.unitMap || {}, defaultPres: d.defaultPres || {}, templateHash: d.templateHash || '', templateTs: Date.now(), raw: d.raw || null };
    return true;
  } catch(e) { console.warn('plantilla fetch:', e); return false; }
}

// Preparación activa (R5): zonas/artículos/orden editados en admin. Si no hay,
// la app usa el comportamiento legacy (AREA_CONFIG hardcodeado o catálogo completo).
async function fetchZoneConfigWorker() {
  try {
    const r = await fetch(WORKER_URL + '/inv/zone-config?almacen=' + ALMACEN);
    if (!r.ok) return null;
    const d = await r.json();
    return (d.ok && d.found && d.zones?.length) ? d : null;
  } catch(e) { console.warn('zone-config fetch:', e); return null; }
}

async function fetchSesionWorker(fecha) {
  try {
    const r = await fetch(WORKER_URL + '/inv/sesion?almacen=' + ALMACEN + '&fecha=' + encodeURIComponent(fecha));
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.ok || !d.found) return null;
    return normalizeSesion(d);
  } catch(e) { console.warn('sesion fetch:', e); return null; }
}

// Busca la toma abierta (no exportada) más reciente del almacén, aunque sea de un
// día anterior. inv_sesiones tiene PK (almacen, fecha): si esto no se ofrece, un
// dispositivo nuevo al día siguiente arranca sesión vacía y fragmenta el conteo.
async function fetchSesionAbiertaWorker(dias = 7) {
  try {
    const r = await fetch(WORKER_URL + '/inv/sesiones?almacen=' + ALMACEN + '&dias=' + dias);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d.ok) return null;
    const abiertas = (d.sesiones || []).filter(s => !s.exportedAt && s.articulosContados > 0);
    if (!abiertas.length) return null;
    abiertas.sort((a, b) => b.fecha.localeCompare(a.fecha));
    return await fetchSesionWorker(abiertas[0].fecha);
  } catch(e) { console.warn('sesiones fetch:', e); return null; }
}

function syncSesionWorker() {
  if (!S) return;
  // Solo enviamos la zona activa de este dispositivo. Clave "zoneIdx:deviceId" garantiza
  // que el merge del Worker no pise los conteos de otros dispositivos en la misma zona.
  const myKey = CZ !== null ? myZoneKey(CZ) : null;
  const cbz   = myKey ? { [myKey]: S.countsByZone?.[myKey]  || {} } : {};
  const pcbz  = myKey ? { [myKey]: S.presChoiceByZone?.[myKey] || {} } : {};
  const removeCompletedZones = S.pendingCompletedZoneRemovals || [];
  // El snapshot pesa (todas las zonas con artículos): se envía solo hasta que el
  // Worker lo tenga (first-write-wins allá; snapshotSynced acá).
  const sendSnapshot = !!(S.zoneSnapshot?.length && !S.snapshotSynced);
  fetch(WORKER_URL + '/inv/sesion', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      action:'inv_sesion',
      almacen:ALMACEN,
      operario:S.operario,
      fecha:S.fecha,
      templateHash:S.templateHash||'',
      countsByZone:cbz,
      presChoiceByZone:pcbz,
      correctionsByZone:S.correctionsByZone||{},
      completedZones:S.completedZones||[],
      removeCompletedZones,
      manuales:S.manuales||[],
      zoneConfigId:S.zoneConfigId||'',
      zoneSnapshot: sendSnapshot ? S.zoneSnapshot : undefined
    })
  })
  .then(() => {
    let dirty = false;
    if (removeCompletedZones.length && S) {
      S.pendingCompletedZoneRemovals = (S.pendingCompletedZoneRemovals || []).filter(z => !removeCompletedZones.includes(z));
      dirty = true;
    }
    if (sendSnapshot && S) { S.snapshotSynced = true; dirty = true; }
    if (dirty && S) lsSet('s', S);
  })
  .catch(e => console.warn('sesion sync:', e));
}

function scheduleSyncSesion() { clearTimeout(_syncTimer); _syncTimer = setTimeout(syncSesionWorker, 3000); }

async function lockZone(zoneIdx, release) {
  try {
    const r = await fetch(WORKER_URL + '/inv/sesion', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'inv_lock', almacen:ALMACEN, fecha:S.fecha, zone_idx:zoneIdx, device_id:getDeviceId(), operario:S.operario, release:!!release })
    });
    return await r.json();
  } catch(e) { console.warn('lockZone:', e); return { ok:true }; }
}

async function pollLocks() {
  if (!S) return;
  try {
    const r = await fetch(WORKER_URL + '/inv/sesion?almacen=' + ALMACEN + '&fecha=' + encodeURIComponent(S.fecha));
    if (!r.ok) return;
    const d = await r.json();
    if (d.ok && d.found) {
      _remoteLockedZones = d.lockedZones || {};
      S.correctionsByZone = d.correctionsByZone || S.correctionsByZone || {};
      renderOverview();
    }
  } catch(e) {}
}

function startPoll() { stopPoll(); _pollTimer = setInterval(pollLocks, 8000); }
function stopPoll()  { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }

// ── Resolución de zonas dinámicas ──────────────────────────────────────────

// Fallback cuando D1 no tiene catálogo: leer artículos directo del xlsx de la plantilla
async function buildItemsFromRaw(raw) {
  const bin = atob(raw), bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const wb   = XLSX.read(bytes.buffer, { type:'array' });
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
  const norm = s => String(s ?? '').replace(/^﻿/,'').trim();
  const hIdx = rows.findIndex(r => r.some(h => /^c[oó]digo$/i.test(norm(h))));
  if (hIdx === -1) return [];
  const H    = rows[hIdx].map(norm);
  const iCod = H.findIndex(h => /^c[oó]digo$/i.test(h));
  const iArt = H.findIndex(h => /^art[ií]culo$/i.test(h));
  const iUni = H.findIndex(h => /^unidad$/i.test(h));
  const iSub = H.findIndex(h => /^subgrupo$/i.test(h));
  const iGrp = H.findIndex(h => /^grupo$/i.test(h));
  const out  = [];
  for (let r = hIdx + 1; r < rows.length; r++) {
    const row = rows[r];
    const num = norm(row[0]), cod = norm(row[iCod]);
    if (!num || !cod || /_\d+$/.test(cod)) continue;
    const art = iArt >= 0 ? norm(row[iArt]) : cod;
    const uni = (T?.unitMap?.[cod]) || (iUni >= 0 ? norm(row[iUni]) : '');
    const grp = (iSub >= 0 && norm(row[iSub])) || (iGrp >= 0 ? norm(row[iGrp]) : '');
    out.push({ cod, art, uni, grp });
  }
  return out;
}

function indexTemplateItems(items) {
  _templateItemsByCod = {};
  (items || []).forEach(item => { if (item.cod) _templateItemsByCod[item.cod] = item; });
}

function applyTemplateItem(item) {
  const tpl = _templateItemsByCod[item.cod];
  if (!tpl) return item;
  return {
    ...item,
    art: tpl.art || item.art,
    uni: tpl.uni || item.uni,
    grp: tpl.grp || item.grp
  };
}

function normalizeSearchText(s) {
  return String(s ?? '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().trim();
}

function matchesSearchText(text, query) {
  const haystack = normalizeSearchText(text);
  const tokens = normalizeSearchText(query).split(/\s+/).filter(Boolean);
  return tokens.length > 0 && tokens.every(t => haystack.includes(t));
}

function resolveTemplateItem(input) {
  const raw = String(input || '').trim();
  if (!raw) return null;
  const codeLike = raw.split(/\s+[-·]\s+/)[0].trim().toUpperCase();
  if (_templateItemsByCod[codeLike]) return _templateItemsByCod[codeLike];
  const q = normalizeSearchText(raw);
  const items = Object.values(_templateItemsByCod);
  return items.find(i => normalizeSearchText(i.cod) === q)
      || items.find(i => normalizeSearchText(i.art) === q)
      || items.find(i => matchesSearchText(itemSearchText(i), q))
      || null;
}

function renderTemplateDatalist() {
  const dl = document.getElementById('manual-template-list');
  if (!dl) return;
  dl.innerHTML = Object.values(_templateItemsByCod)
    .sort((a,b) => String(a.art || a.cod).localeCompare(String(b.art || b.cod)))
    .map(i => `<option value="${esc(i.cod)} - ${esc(i.art || i.cod)}"></option>`)
    .join('');
}

// Zonas desde la preparación editable (inv_zone_configs): solo artículos activos,
// en el orden del editor. Nombres/unidades salen del catálogo D1 + xlsx de plantilla.
async function resolveZonasFromConfig(cfgZones) {
  const lookup = {};
  try {
    const r = await fetch(WORKER_URL + '/articulos?almacen=' + ALMACEN);
    if (r.ok) {
      const d = await r.json();
      (d.articulos || []).forEach(a => {
        lookup[a.codigo] = { cod: a.codigo, art: a.nombre, uni: (T?.unitMap?.[a.codigo]) || a.unidad || '', grp: a.subgrupo || a.grupo || '' };
      });
    }
  } catch(e) { console.warn('articulos fetch:', e); }
  if (T?.raw) {
    try { indexTemplateItems(await buildItemsFromRaw(T.raw)); } catch(e) { console.warn('buildItemsFromRaw config:', e); }
  }
  return cfgZones.map(z => ({
    nombre: z.nombre,
    color: z.color || CFG.color,
    items: (z.items || [])
      .filter(it => it.activo !== false)
      .sort((a, b) => (a.orden ?? 0) - (b.orden ?? 0))
      .map(it => applyTemplateItem(lookup[it.cod] || { cod: it.cod, art: it.cod, uni: T?.unitMap?.[it.cod] || '', grp: '' }))
  })).filter(z => z.items.length);
}

async function resolveZonas() {
  // R5: la preparación activa manda sobre el hardcode y el catálogo completo
  if (ZCFG?.zones?.length) return await resolveZonasFromConfig(ZCFG.zones);
  if (CFG.zonas) {
    const zones = CFG.zonas.map(z => ({ ...z, items: [...(z.items || [])] }));
    if (T?.raw) {
      try {
        const fromRaw = await buildItemsFromRaw(T.raw);
        indexTemplateItems(fromRaw);
        const existing = new Set(zones.flatMap(z => z.items.map(i => i.cod)));
        const missing = fromRaw.filter(i => (i.cod in (T.rowMap || {})) && !existing.has(i.cod));
        if (missing.length) {
          console.info('Complementando zonas hardcodeadas con', missing.length, 'artículos del xlsx:', missing.map(i => i.cod));
          zones.push({
            nombre: 'En plantilla',
            color: CFG.color,
            items: missing
          });
        }
      } catch(e) { console.warn('buildItemsFromRaw hardcoded complement:', e); }
    }
    return zones;
  }
  // Cargar catálogo desde D1
  let items = [];
  try {
    const r = await fetch(WORKER_URL + '/articulos?almacen=' + ALMACEN);
    if (r.ok) {
      const d = await r.json();
      const rm = T?.rowMap;
      items = (d.articulos || d || [])
        .filter(a => !rm || a.codigo in rm)
        .map(a => ({ cod: a.codigo, art: a.nombre, uni: (T?.unitMap?.[a.codigo]) || a.unidad, grp: a.subgrupo || a.grupo || '' }));
    }
  } catch(e) { console.warn('articulos fetch:', e); }

  // Complementar con artículos del xlsx que estén en rowMap pero falten en D1
  if (T?.raw) {
    try {
      const fromRaw = await buildItemsFromRaw(T.raw);
      indexTemplateItems(fromRaw);
      const existing = new Set(items.map(i => i.cod));
      const missing = fromRaw.filter(i => (i.cod in (T.rowMap || {})) && !existing.has(i.cod));
      if (missing.length) {
        console.info('Complementando catálogo con', missing.length, 'artículos del xlsx:', missing.map(i => i.cod));
        items = [...items, ...missing];
      }
    } catch(e) { console.warn('buildItemsFromRaw complement:', e); }
  }
  items = items.map(applyTemplateItem);

  // Si hay zonaNames, replicar el catálogo en N zonas independientes
  if (CFG.zonaNames?.length) {
    return CFG.zonaNames.map((nombre, i) => ({
      nombre,
      color: CFG.zonaColors?.[i] || CFG.color,
      items: [...items]
    }));
  }
  return [{ nombre: CFG.titulo, color: CFG.color, items }];
}

// ── Init ───────────────────────────────────────────────────────────────────

async function selectArea(key) {
  // R8: un almacén de otro centro nunca se abre desde esta URL
  if (!AREA_CONFIG[key] || centroDe(key) !== CENTRO) { ALMACEN = null; renderWelcome(); return; }
  ALMACEN = key;
  CFG     = AREA_CONFIG[key];
  const savedKey = key;
  T = null;
  _templateItemsByCod = {};
  setColor(CFG.color);
  document.getElementById('inp-fecha').value = new Date().toISOString().slice(0,10);

  S = lsGet('s');
  const [ok, zcfg] = await Promise.all([fetchPlantillaWorker(), fetchZoneConfigWorker()]);
  if (ALMACEN !== savedKey) return;
  if (!ok) T = null;
  ZCFG = zcfg;

  // Regla crítica (§14): una sesión existente se renderiza desde SU zoneSnapshot,
  // nunca desde la preparación activa actual. Sin snapshot: resolución normal.
  if (S?.zoneSnapshot?.length) {
    ZONAS = S.zoneSnapshot;
    if (T?.raw) { try { indexTemplateItems(await buildItemsFromRaw(T.raw)); } catch(e) {} }
  } else {
    ZONAS = await resolveZonas();
  }
  if (ALMACEN !== savedKey) return;

  // Con sesión local: sincronizar contra su misma fecha. Sin sesión local: ofrecer
  // la toma abierta más reciente del Worker (puede ser de un día anterior).
  _remoteSes = S?.fecha ? await fetchSesionWorker(S.fecha) : await fetchSesionAbiertaWorker();
  if (ALMACEN !== savedKey) return;

  renderAreaWelcome();
}

// ── Pantalla: selector de área ─────────────────────────────────────────────

function renderWelcome() {
  setColor('#667eea');
  const body = document.getElementById('welcome-body');
  const sub  = document.getElementById('welcome-sub');
  sub.textContent = 'Inventarios · ' + CENTROS[CENTRO].nombre;

  const sorted = Object.entries(AREA_CONFIG)
    .filter(([key]) => centroDe(key) === CENTRO)
    .sort((a, b) => a[1].titulo.localeCompare(b[1].titulo, 'es'));
  const options = sorted.map(([key, cfg]) => {
    return `<option value="${key}">${cfg.titulo}</option>`;
  }).join('');

  body.innerHTML = `
    <div style="padding:24px 16px 16px">
      <div class="form-group">
        <label for="area-select">Almacén</label>
        <select id="area-select">
          <option value="" disabled selected>— Seleccionar —</option>
          ${options}
        </select>
      </div>
      <button class="btn btn-primary" onclick="onAreaSelectGo()">Continuar →</button>
    </div>`;
  renderSupBadge();
}

function onAreaSelectGo() {
  const sel = document.getElementById('area-select');
  if (!sel.value) return;
  selectArea(sel.value);
}

function renderAreaWelcome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-welcome').classList.add('active');

  const totalItems = ZONAS.reduce((a,z) => a + z.items.length, 0);
  const sub  = document.getElementById('welcome-sub');
  const body = document.getElementById('welcome-body');
  sub.textContent = `${CFG.titulo} · ${totalItems} artículos · ${ZONAS.length} zona${ZONAS.length!==1?'s':''}`;

  let html = `<button class="btn btn-gray" style="margin-bottom:12px" onclick="ALMACEN=null;go('welcome')">← Cambiar almacén</button>`;

  if (!T) {
    html += `<div class="alert alert-warn"><div class="alert-title">${ic('triangle-alert',15)} Plantilla no configurada</div>Contacta al administrador para subir la plantilla de este almacén. Puedes contar, pero no podrás generar el Excel para Xetux.</div>
      <div class="section-label">Zonas</div>` +
      ZONAS.map(z => `<div class="zone-card" style="border-left-color:${z.color}">
        <div class="zone-dot" style="background:${z.color}"></div>
        <div class="zone-info"><div class="zone-name">${esc(z.nombre)}</div><div class="zone-meta">${z.items.length} artículos</div></div>
      </div>`).join('') +
      `<div style="margin-top:12px"><button class="btn btn-gray" onclick="go('session')">Iniciar conteo sin plantilla</button></div>`;
    body.innerHTML = html;
    return;
  }

  if (S && S.fecha) {
    const counted = countedCodCount(S);
    const remoteCount = countedCodCount(_remoteSes);
    const remotePrompt = _remoteSes && _remoteSes.fecha === S.fecha && remoteCount > counted
      ? `<div class="alert alert-warn" style="margin-top:8px">
          <div class="alert-title">${ic('refresh-cw',15)} Hay una toma con más conteos en servidor</div>
          Servidor: ${remoteCount} artículos · Este dispositivo: ${counted}
          <div style="margin-top:8px"><button class="btn btn-primary btn-sm" style="width:auto;display:inline-block" onclick="loadRemoteSesion()">Cargar toma del servidor</button></div>
        </div>`
      : '';
    const done    = new Set((S.completedZones||[]).map(k => baseZone(k))).size;
    const warnHash = T.templateHash && S.templateHash && T.templateHash !== S.templateHash
      ? `<div class="alert alert-warn" style="margin-top:8px"><div class="alert-title">${ic('triangle-alert',15)} La plantilla cambió desde que inició esta toma</div>Los factores de conversión pueden haber cambiado.</div>` : '';
    html += `<div class="card" style="border-left:4px solid ${CFG.color}">
      <div style="font-weight:700;margin-bottom:2px">Toma del ${S.fecha}</div>
      <div style="font-size:13px;color:#888">${S.operario} · ${done}/${ZONAS.length} zonas · ${counted} artículos contados</div>
      ${warnHash}
      ${remotePrompt}
      <div class="row">
        <button class="btn btn-primary" style="flex:2" onclick="go('overview')">Continuar →</button>
        <button class="btn btn-gray btn-sm" style="flex:1" onclick="confirmNewSession()">Nueva</button>
      </div></div>`;
  } else {
    let remoteCard = '';
    if (_remoteSes) {
      const rc = Object.values(_remoteSes.countsByZone||{}).reduce((a,z)=>a+Object.keys(z).length,0);
      const hoy = new Date().toISOString().slice(0,10);
      const otroDia = _remoteSes.fecha !== hoy
        ? `<div style="font-size:12px;color:#b45309;margin-bottom:8px">${ic('triangle-alert',13)} Iniciada otro día y sin cerrar. Continúala para que el conteo no se fragmente en dos sesiones.</div>`
        : '';
      remoteCard = `<div class="card" style="border-left:4px solid #f59e0b;margin-bottom:16px">
        <div style="font-weight:700;margin-bottom:2px">${ic('refresh-cw',15)} Toma abierta del ${esc(_remoteSes.fecha)}</div>
        <div style="font-size:13px;color:#888;margin-bottom:8px">${esc(_remoteSes.operario)} · ${rc} artículos contados</div>
        ${otroDia}
        <div class="row">
          <button class="btn btn-primary" style="flex:2" onclick="loadRemoteSesion()">Continuar esta toma →</button>
          <button class="btn btn-gray btn-sm" style="flex:1" onclick="_remoteSes=null;renderAreaWelcome()">Ignorar</button>
        </div></div>`;
    }
    html += remoteCard +
      `<button class="btn btn-primary" onclick="go('session')">Iniciar nueva toma →</button>`;
  }
  body.innerHTML = html;
}

function loadRemoteSesion() {
  if (S && countedCodCount(S) > 0 && !confirm('Esto reemplazará la sesión local de este dispositivo con la toma del servidor. ¿Continuar?')) return;
  _remoteLockedZones = _remoteSes.lockedZones || {};
  S = normalizeSesion(_remoteSes);
  _remoteSes = null;
  // La toma remota trae su propio snapshot de zonas: usarlo tal cual
  if (S.zoneSnapshot?.length) ZONAS = S.zoneSnapshot;
  lsSet('s', S);
  go('overview');
}

async function confirmNewSession() {
  if (!confirm('¿Iniciar nueva toma? Se perderán los conteos actuales.')) return;
  S = null; lsDel('s');
  // La sesión vieja pudo renderizarse desde su snapshot: re-resolver zonas actuales
  ZONAS = await resolveZonas();
  renderAreaWelcome();
}

// ── Sesión ─────────────────────────────────────────────────────────────────

function startSession() {
  const operario = document.getElementById('inp-operario').value.trim();
  const fecha    = document.getElementById('inp-fecha').value;
  if (!operario) { alert('Ingresa tu nombre'); return; }
  if (!fecha)    { alert('Selecciona la fecha'); return; }
  // Snapshot §14: la toma congela zonas/orden/activos con los que inició — editar
  // la preparación después no la altera. Se envía al Worker en el primer sync.
  S = { operario, fecha, templateHash: T?.templateHash||'', countsByZone:{}, presChoiceByZone:{}, correctionsByZone:{}, completedZones:[], manuales:[], reopenedZones:{}, pendingCompletedZoneRemovals:[],
        zoneConfigId: ZCFG?.id || '', zoneSnapshot: JSON.parse(JSON.stringify(ZONAS || [])), snapshotSynced: false };
  lsSet('s', S);
  syncSesionWorker();
  go('overview');
}

// ── Conteo ─────────────────────────────────────────────────────────────────

async function startCount(zoneIdx) {
  // Bloquear solo si ESTE dispositivo ya completó esta zona
  if ((S.completedZones||[]).indexOf(myZoneKey(zoneIdx)) !== -1) return;
  // Si otro dispositivo está contando la misma zona, el overview lo muestra — pero no bloqueamos
  lockZone(zoneIdx, false).catch(() => {}); // registrar presencia; no bloquear si falla
  _remoteLockedZones[zoneIdx] = { device_id: getDeviceId(), operario: S.operario };
  _lastZoneClosedMsg = '';
  CZ = zoneIdx;
  const zone = ZONAS[zoneIdx];
  document.getElementById('count-zone-name').textContent = zone.nombre;
  document.getElementById('count-hdr').style.background = zone.color;
  document.getElementById('count-search').value = '';
  renderCountList(zone.items, myZoneKey(zoneIdx));
  updateProgress();
  updateManualesBadge();
  go('count');
}

function reopenZone(zoneIdx) {
  const zid = myZoneKey(zoneIdx);
  const zone = ZONAS[zoneIdx];
  if ((S.completedZones||[]).indexOf(zid) === -1) {
    startCount(zoneIdx);
    return;
  }
  if (!confirm(`Editar "${zone.nombre}"?\n\nLos cambios que hagas se marcarán en amarillo en Admin y Sheets.`)) return;
  S.completedZones = (S.completedZones || []).filter(z => z !== zid);
  if (!S.reopenedZones) S.reopenedZones = {};
  if (!S.pendingCompletedZoneRemovals) S.pendingCompletedZoneRemovals = [];
  S.reopenedZones[zid] = true;
  if (!S.pendingCompletedZoneRemovals.includes(zid)) S.pendingCompletedZoneRemovals.push(zid);
  _lastZoneClosedMsg = `${zone.nombre} reabierta. Los cambios quedarán marcados como corrección.`;
  lsSet('s', S);
  syncSesionWorker();
  startCount(zoneIdx);
}

function getQtyForZone(zid, cod) {
  return (S.countsByZone?.[zid])?.[cod];
}

function getPresOptions(cod) {
  const explicit = T?.presMap?.[cod];
  if (explicit?.length) return explicit;
  const uni = T?.unitMap?.[cod] || '';
  return (T?.defaultPres?.[uni]) || [];
}

function getPresChoice(zid, cod) {
  return (S.presChoiceByZone?.[zid])?.[cod] ?? null;
}

function itemSearchText(item) {
  const templateItem = _templateItemsByCod[item.cod] || null;
  const pres = getPresOptions(item.cod)
    .map(o => `${o.nombre || ''} ${o.factor || ''}`)
    .join(' ');
  return `${item.art || ''} ${templateItem?.art || ''} ${item.cod || ''} ${item.uni || ''} ${pres}`;
}

function markCorrection(zid, cod, tipo) {
  if (!S.reopenedZones?.[zid]) return;
  if (!S.correctionsByZone) S.correctionsByZone = {};
  if (!S.correctionsByZone[zid]) S.correctionsByZone[zid] = {};
  S.correctionsByZone[zid][cod] = {
    tipo,
    operario:S.operario,
    at:new Date().toISOString(),
    zona:ZONAS[baseZone(zid)]?.nombre || ''
  };
}

function hasCorrection(zid, cod) {
  return !!S.correctionsByZone?.[zid]?.[cod];
}

function renderItemRow(item, zid, inOtherZone) {
  const templateItem = _templateItemsByCod[item.cod] || null;
  const displayItem = templateItem
    ? { ...item, art: templateItem.art || item.art, uni: templateItem.uni || item.uni, grp: templateItem.grp || item.grp }
    : item;
  const raw    = getQtyForZone(zid, item.cod);
  const flt    = raw !== undefined ? parseFloat(raw) : NaN;
  const opts   = getPresOptions(item.cod);
  const chosen = getPresChoice(zid, item.cod) ?? (opts[0]?.factor ?? null);
  const filled = raw !== undefined ? 'filled' : '';
  const corrected = hasCorrection(zid, item.cod);
  const dataZ  = `data-zid="${zid}"`;

  let presHtml = '';
  if (opts.length === 1) {
    const f = opts[0].factor;
    const ltStr = !isNaN(flt) ? fmtNum(flt * f) : '—';
    presHtml = `<span class="lt-badge" id="ltb_${zid}_${esc(item.cod)}">${ltStr} ${item.uni}</span>`;
  } else if (opts.length > 1) {
    const selOpts = opts.map(o => `<option value="${o.factor}" ${o.factor==chosen?'selected':''}>${o.nombre} (${o.factor})</option>`).join('');
    const ltStr = chosen && !isNaN(flt) ? fmtNum(flt * chosen) : (raw!==undefined?fmtNum(flt):'—');
    presHtml = `<select class="pres-sel" ${dataZ} data-cod="${esc(item.cod)}" onchange="onPresChange(this)">${selOpts}</select>
      <span class="lt-badge" id="ltb_${zid}_${esc(item.cod)}">${ltStr} ${item.uni}</span>`;
  }

  const unitLabel = opts.length === 1 ? `bots × ${opts[0].factor} ${displayItem.uni}`
                  : opts.length > 1   ? `${displayItem.uni} · selecciona presentación`
                  : displayItem.uni;
  const unitWarn  = (displayItem.uni === 'LT' || displayItem.uni === 'KG') && opts.length === 0 ? ' warn' : '';
  const inputStep = opts.length > 0 && displayItem.uni !== 'PZA' ? '0.5' : '0.01';

  const comment = getComment(item.cod);
  const commentBtn = _supervisorActual
    ? `<button class="comment-btn${comment?' has-comment':''}" onclick="openCommentModal('${esc(item.cod)}','${esc(displayItem.art)}')" title="${comment?'Ver comentario':'Agregar comentario'}">${ic('message-circle',15)}</button>`
    : '';
  const commentText = comment ? `<div class="item-comment-text">${esc(comment.texto)}</div>` : '';

  return `<div class="item-row${inOtherZone?' other-zone':''}${corrected?' corrected':''}" data-search="${esc(itemSearchText(item))}">
    <div class="item-text">
      <div style="display:flex;align-items:flex-start;gap:4px">
        <div class="item-name" style="flex:1">${esc(displayItem.art)}</div>
        ${commentBtn}
      </div>
      <div class="item-unit${unitWarn}">${unitLabel}</div>
      ${corrected ? '<span class="correction-badge">Editado despues de cerrar</span>' : ''}
      ${commentText}
    </div>
    <div class="qty-wrap">
      ${presHtml}
      <input type="number" class="qty-input ${filled}" inputmode="decimal"
        step="${inputStep}" min="0" placeholder="0"
        value="${raw!==undefined?raw:''}"
        ${dataZ} data-cod="${esc(item.cod)}"
        oninput="onQty(this)" onfocus="this.select()">
    </div>
  </div>`;
}

function renderCountList(items, zid) {
  let html = '', lastGrp = null;
  for (const item of items) {
    if (item.grp !== lastGrp) {
      lastGrp = item.grp;
      if (item.grp) html += `<div class="subgrupo-hdr" data-grp="${esc(item.grp)}">${esc(item.grp)}</div>`;
    }
    html += renderItemRow(item, zid, false);
  }
  document.getElementById('count-list').innerHTML = html;
}

function onQty(inp) {
  const zid = inp.dataset.zid;
  const cod = inp.dataset.cod;
  const v   = inp.value.trim();
  const num = parseFloat(v);
  if (!S.countsByZone) S.countsByZone = {};
  if (!S.countsByZone[zid]) S.countsByZone[zid] = {};

  if (v !== '' && !isNaN(num) && num >= 0) {
    S.countsByZone[zid][cod] = num;
    markCorrection(zid, cod, 'cantidad');
    // Actualizar badge LT
    const chosen = getPresChoice(zid, cod) ?? (getPresOptions(cod)[0]?.factor ?? null);
    if (chosen) {
      const badge = document.getElementById('ltb_' + zid + '_' + cod);
      if (badge) badge.textContent = fmtNum(num * chosen) + ' ' + (ZONAS[CZ]?.items.find(i=>i.cod===cod)?.uni || 'LT');
    }
  } else {
    delete S.countsByZone[zid][cod];
    markCorrection(zid, cod, 'borrado');
    const badge = document.getElementById('ltb_' + zid + '_' + cod);
    if (badge) badge.textContent = '— ' + (getPresOptions(cod)[0] ? (ZONAS[CZ]?.items.find(i=>i.cod===cod)?.uni||'LT') : 'LT');
  }

  inp.classList.toggle('filled', v !== '' && !isNaN(parseFloat(v)));
  lsSet('s', S);
  scheduleSyncSesion();
  updateProgress();
}

function onPresChange(sel) {
  const zid = sel.dataset.zid;
  const cod = sel.dataset.cod;
  const f   = parseFloat(sel.value);
  if (!S.presChoiceByZone) S.presChoiceByZone = {};
  if (!S.presChoiceByZone[zid]) S.presChoiceByZone[zid] = {};
  S.presChoiceByZone[zid][cod] = f;
  markCorrection(zid, cod, 'presentacion');
  // Recalcular badge
  const qty = getQtyForZone(zid, cod);
  const badge = document.getElementById('ltb_' + zid + '_' + cod);
  if (badge && qty !== undefined) badge.textContent = fmtNum(qty * f) + ' ' + (ZONAS[CZ]?.items.find(i=>i.cod===cod)?.uni||'LT');
  lsSet('s', S);
  scheduleSyncSesion();
}

function updateProgress() {
  if (CZ === null) return;
  const zone   = ZONAS[CZ];
  const zbz    = S.countsByZone?.[myZoneKey(CZ)] || {};
  const filled = zone.items.filter(i => zbz[i.cod] !== undefined).length;
  const pct    = zone.items.length ? filled / zone.items.length * 100 : 0;
  document.getElementById('count-bar').style.width = pct + '%';
  document.getElementById('count-pct').textContent = filled + '/' + zone.items.length;
}

function hlMatch(text, q) {
  if (!q) return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const esc2 = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc2(text.slice(0,idx)) + '<mark>' + esc2(text.slice(idx,idx+q.length)) + '</mark>' + esc2(text.slice(idx+q.length));
}

function filterCount(q) {
  const ql = q.toLowerCase().trim();
  document.querySelectorAll('#count-list .item-row').forEach(r => {
    const searchStr = r.dataset.search || '';
    const matches = !!ql && matchesSearchText(searchStr, ql);
    r.classList.toggle('hidden', !!ql && !matches);
    r.classList.toggle('search-match', matches);
    const nameEl = r.querySelector('.item-name');
    if (nameEl) {
      if (!nameEl.dataset.name) nameEl.dataset.name = nameEl.textContent;
      nameEl.innerHTML = matches ? hlMatch(nameEl.dataset.name, ql) : nameEl.dataset.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  });
  document.querySelectorAll('#count-list .subgrupo-hdr').forEach(hdr => {
    let next = hdr.nextElementSibling, vis = false;
    while (next && !next.classList.contains('subgrupo-hdr')) {
      if (next.classList.contains('item-row') && !next.classList.contains('hidden')) vis = true;
      next = next.nextElementSibling;
    }
    hdr.classList.toggle('hidden', !vis);
  });

  let extra = document.getElementById('count-extra');
  if (!extra) { extra = document.createElement('div'); extra.id = 'count-extra'; document.getElementById('count-list').after(extra); }
  if (!ql) { extra.innerHTML = ''; return; }

  const currentCods = new Set(CZ !== null ? ZONAS[CZ].items.map(i => i.cod) : []);
  let html = '';

  // Resultados de otras zonas
  ZONAS.forEach((zone, zi) => {
    if (zi === CZ) return;
    const matches = zone.items.filter(item =>
      !currentCods.has(item.cod) &&
      matchesSearchText(itemSearchText(item), ql)
    );
    if (!matches.length) return;
    html += `<div class="subgrupo-hdr" style="background:#fef3c7;color:#92400e">${esc(zone.nombre)}</div>`;
    matches.forEach(item => { html += renderItemRow(item, myZoneKey(CZ), true); currentCods.add(item.cod); });
  });

  // Fuera de zona: en plantilla pero no en ninguna zona
  if (T?.rowMap) {
    const allZoneCods = new Set(ZONAS.flatMap(z => z.items.map(i => i.cod)));
    const fuera = Object.keys(T.rowMap).filter(cod =>
      !allZoneCods.has(cod) &&
      matchesSearchText(itemSearchText(_templateItemsByCod[cod] || { cod, art: cod, uni: T.unitMap?.[cod] || '' }), ql)
    );
    if (fuera.length) {
      html += `<div class="subgrupo-hdr" style="background:#f0fdf4;color:#166534;border-top:2px solid #e5e7eb">Fuera de zona · en plantilla</div>`;
      fuera.forEach(cod => {
        const zid   = myZoneKey(CZ);
        const raw   = (S.countsByZone?.[zid])?.[cod];
        const opts  = getPresOptions(cod);
        const filled= raw !== undefined ? 'filled' : '';
        const flt   = raw !== undefined ? parseFloat(raw) : NaN;
        const f     = opts[0]?.factor ?? null;
        const ltStr = f && !isNaN(flt) ? fmtNum(flt * f) : (raw!==undefined?String(raw):'—');
        const item = _templateItemsByCod[cod] || { cod, art: cod, uni: T.unitMap?.[cod] || '' };
        html += `<div class="item-row" data-search="${esc(itemSearchText(item))}">
          <div class="item-text"><div class="item-name">${esc(item.art)}</div><div class="item-unit">fuera de zona · ${esc(item.uni || '')}</div></div>
          <div class="qty-wrap">
            ${f ? `<span class="lt-badge" id="ltb_${esc(zid)}_${esc(cod)}">${ltStr} LT</span>` : ''}
            <input type="number" class="qty-input ${filled}" inputmode="decimal" step="0.01" min="0" placeholder="0"
              value="${raw!==undefined?raw:''}" data-zid="${esc(zid)}" data-cod="${esc(cod)}" oninput="onQty(this)" onfocus="this.select()">
          </div></div>`;
      });
    }
  }

  extra.innerHTML = html ? `<div class="subgrupo-hdr" style="background:#f0f0f0;color:#666;border-top:2px solid #e5e7eb">Otras zonas</div>${html}` : '';
}

function clearSearch() {
  document.getElementById('count-search').value = '';
  filterCount('');
  const e = document.getElementById('count-extra');
  if (e) e.innerHTML = '';
}

function exitCount() {
  if (CZ !== null) { lockZone(CZ, true); delete _remoteLockedZones[CZ]; }
  CZ = null;
  go('overview');
}

function doneZone() {
  if (CZ === null) return;
  const zone = ZONAS[CZ];
  const zid = myZoneKey(CZ);
  const zbz = S.countsByZone?.[zid] || {};
  const filled = zone.items.filter(i => zbz[i.cod] !== undefined).length;
  if (!confirm(`Cerrar "${zone.nombre}"?\n\nCapturaste ${filled} de ${zone.items.length} artículos en esta zona. Después volverás al listado para elegir otra zona.`)) return;
  if ((S.completedZones||[]).indexOf(zid) === -1) {
    if (!S.completedZones) S.completedZones = [];
    S.completedZones.push(zid);
  }
  _lastZoneClosedMsg = `${zone.nombre} quedó cerrada para ${S.operario}. Elige otra zona para continuar la toma.`;
  lsSet('s', S);
  if (CZ !== null) { lockZone(CZ, true); delete _remoteLockedZones[CZ]; }
  syncSesionWorker();
  CZ = null;
  go('overview');
}

// ── Overview ───────────────────────────────────────────────────────────────

function renderOverview() {
  if (!S) { go('welcome'); return; }
  document.getElementById('ov-title').textContent = 'Toma · ' + S.fecha;
  document.getElementById('ov-meta').textContent  = S.operario + ' · ' + CFG.titulo;
  document.getElementById('ov-hdr').style.background = CFG.color;
  document.getElementById('ov-feedback').innerHTML = _lastZoneClosedMsg
    ? `<div class="zone-done-banner"><strong>Zona cerrada</strong>${esc(_lastZoneClosedMsg)}</div>`
    : '';

  // Advertencia de plantilla cambiada
  const ov_warn = document.getElementById('ov-warn');
  if (T?.templateHash && S.templateHash && T.templateHash !== S.templateHash) {
    ov_warn.innerHTML = `<div class="alert alert-warn"><div class="alert-title">${ic('triangle-alert',15)} La plantilla cambió</div>Los factores de conversión pueden diferir de cuando inició esta toma.</div>`;
  } else ov_warn.innerHTML = '';

  let total = 0, filled = 0, allDone = true;
  const myDev = ':' + getDeviceId();
  const html = ZONAS.map((zone, i) => {
    // Sumar conteos de TODOS los dispositivos para esta zona (para mostrar progreso real)
    const zbz = {};
    for (const [key, counts] of Object.entries(S.countsByZone || {})) {
      if (baseZone(key) === i) {
        for (const [cod, qty] of Object.entries(counts)) zbz[cod] = (zbz[cod]||0) + qty;
      }
    }
	    const zoneFilled = zone.items.filter(it => zbz[it.cod] !== undefined).length;
	    const done       = (S.completedZones||[]).indexOf(myZoneKey(i)) !== -1;
	    const zid        = myZoneKey(i);
	    const correctedCount = Object.keys(S.correctionsByZone?.[zid] || {}).length;
	    const pct        = zone.items.length ? Math.round(zoneFilled / zone.items.length * 100) : 0;
    total  += zone.items.length;
    filled += zoneFilled;
    if (!done) allDone = false;
    const remoteLock    = _remoteLockedZones[i];
    const otherCounting = !done && remoteLock && remoteLock.device_id !== getDeviceId();
    const myLock        = !done && remoteLock && remoteLock.device_id === getDeviceId();
	    const cls    = correctedCount ? 'corrected' : done ? 'done' : zoneFilled > 0 ? 'partial' : '';
	    const icon   = correctedCount ? '!' : done ? '✓' : myLock ? '✎' : zoneFilled > 0 ? '...' : '○';
	    let metaLine = zoneFilled + '/' + zone.items.length + ' · ' + pct + '%';
	    if (otherCounting) metaLine += ' · ' + esc(remoteLock.operario) + ' contando';
	    if (done) metaLine += ' · cerrada, toca para editar';
	    if (correctedCount) metaLine += ` · ${correctedCount} correccion${correctedCount!==1?'es':''}`;
	    const clickAttr = done ? ` onclick="reopenZone(${i})"` : ` onclick="startCount(${i})"`;
    return `<div class="zone-card ${cls}"${clickAttr}>
      <div class="zone-dot" style="background:${zone.color}"></div>
      <div class="zone-info">
        <div class="zone-name">${esc(zone.nombre)}</div>
        <div class="zone-meta">${metaLine}</div>
        <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="zone-status">${icon}</div>
    </div>`;
  }).join('');

  document.getElementById('ov-zones').innerHTML = html;
  const pct = total ? filled / total * 100 : 0;
  document.getElementById('ov-bar').style.width = pct + '%';
  const btn = document.getElementById('btn-generate');
  if (!T || !T.raw) {
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'block';
  btn.style.background = CFG.color;
  const myCompleted = (S.completedZones||[]).filter(k => k.endsWith(myDev)).length;
  const pending = ZONAS.length - myCompleted;
  btn.textContent = allDone ? 'Ver resumen →'
    : `Ver resumen (${pending} zona${pending!==1?'s':''} pendiente${pending!==1?'s':''})`;
  btn.title = 'El Excel se genera desde admin.html';
}

// ── Validación ─────────────────────────────────────────────────────────────

function renderValidation() {
  const el = document.getElementById('validation-out');
  document.getElementById('gen-hdr').style.background = CFG?.color || '#667eea';
  if (!S) { el.innerHTML = '<p style="color:#888">Sin sesión.</p>'; return; }

  // Calcular totales por cod
  const totales = {}; // cod → qty_base
  for (const [zid, zc] of Object.entries(S.countsByZone||{})) {
    for (const [cod, qty] of Object.entries(zc)) {
      // getPresOptions, no presMap: incluye los defaults por unidad, que es lo que
      // aplica el export (factorDefault en js/sesion-merge.js). Con presMap a secas
      // la pantalla de validación mostraba el conteo sin convertir.
      const f = (S.presChoiceByZone?.[zid]?.[cod]) ?? (getPresOptions(cod)[0]?.factor ?? 1);
      totales[cod] = (totales[cod] || 0) + qty * f;
    }
  }
  const countedCods = Object.keys(totales);

  const allItems = ZONAS.flatMap(z => z.items);
  const allCods  = [...new Set(allItems.map(i => i.cod))];
  const notCounted = allCods.filter(cod => totales[cod] === undefined);
  const withConv   = countedCods.filter(cod => getPresOptions(cod).length > 0);

  let html = '';
  if (!T || !T.raw) {
    html += `<div class="alert alert-error"><div class="alert-title">${ic('circle-x',15)} Plantilla Xetux no disponible</div>El administrador debe configurar la plantilla de este almacén.</div>`;
  }
  if (notCounted.length) {
    const sample = notCounted.slice(0,5).map(cod => allItems.find(i=>i.cod===cod)?.art||cod);
    html += `<div class="alert alert-warn"><div class="alert-title">${ic('triangle-alert',15)} ${notCounted.length} artículos sin contar → quedarán en blanco</div><div>${sample.join(', ')}${notCounted.length>5?' y '+(notCounted.length-5)+' más…':''}</div></div>`;
  }
  const manualesReales = (S.manuales || []).filter(m => m.type !== 'comment');
  if (manualesReales.length) {
    html += `<div class="alert alert-info"><div class="alert-title">${ic('clipboard-list',15)} ${manualesReales.length} ítem${manualesReales.length!==1?'s':''} no catalogado${manualesReales.length!==1?'s':''}</div>
      <div>${manualesReales.map(m=>esc(m.nombre)+' — '+m.cantidad+' '+esc(m.uni)).join(', ')}</div>
      <div style="margin-top:8px"><button class="btn btn-gray btn-sm" style="width:auto;display:inline-block" onclick="compartirManuales()">Compartir lista</button></div></div>`;
  }
  const comentariosSup = (S.manuales || []).filter(m => m.type === 'comment');
  if (comentariosSup.length) {
    html += `<div class="alert" style="background:#f3e8ff;border-color:#c4b5fd;color:#6d28d9"><div class="alert-title">${ic('message-circle',15)} ${comentariosSup.length} comentario${comentariosSup.length!==1?'s':''} de supervisor</div></div>`;
  }
  html += `<div class="alert alert-ok"><div class="alert-title">${ic('circle-check',15)} ${countedCods.length} artículos con cantidad</div>
    <div>${withConv.length} con conversión · ${countedCods.length - withConv.length} directos</div></div>`;

  el.innerHTML = html;
}

  document.getElementById('man-modal-title').textContent = existing ? 'Editar no catalogado' : 'Ítem no catalogado';
  document.getElementById('man-edit-id').value = editId || '';
  document.getElementById('man-nombre').value = existing?.nombre || '';
  renderTemplateDatalist();
  document.getElementById('man-unidad').value = existing?.uni || existing?.unidad || '';
  const hasPres = !!(existing?.factor && existing.factor !== 1);
  document.getElementById('man-pres-toggle').checked = hasPres;
  document.getElementById('man-pres-block').style.display = hasPres ? '' : 'none';
  document.getElementById('man-pres-nombre').value = existing?.presentacion || '';
  document.getElementById('man-pres-factor').value = existing?.factor || '';
  // Si tiene presentación mostrar cantidadRaw, si no la cantidad base

  updateManualCantidadLabel();
  updateManualTemplateHint();
  document.getElementById('modal-manuales-lista').classList.remove('active');
  document.getElementById('modal-manual').classList.add('active');
}

function closeManualModal() {
  document.getElementById('modal-manual').classList.remove('active');
}

function toggleManualPres(on) {
  document.getElementById('man-pres-block').style.display = on ? '' : 'none';
  updateManualCantidadLabel();
}

function updateManualCantidadLabel() {
  const on     = document.getElementById('man-pres-toggle').checked;
  const factor = parseFloat(document.getElementById('man-pres-factor').value);
  const pres   = document.getElementById('man-pres-nombre').value.trim();
  const uni    = document.getElementById('man-unidad').value.trim();
  const label  = document.getElementById('man-cantidad-label');
  const hint   = document.getElementById('man-pres-hint');
  if (on && factor > 0) {
    label.textContent = `Cantidad (${pres || 'presentaciones'}) *`;
    hint.textContent  = `→ 1 ${pres || 'unidad'} = ${factor} ${uni || 'unidad base'}`;
  } else {
    label.textContent = 'Cantidad *';
    if (hint) hint.textContent = '';
  }
}

function updateManualTemplateHint() {
  const hint = document.getElementById('man-template-hint');
  if (!hint) return;
  const item = resolveTemplateItem(document.getElementById('man-nombre')?.value);
  if (!item) {
    hint.textContent = 'Si existe en plantilla, puedes buscarlo por nombre o código aquí.';
    hint.style.color = '#64748b';
    return;
  }
  hint.textContent = `En plantilla: ${item.art} (${item.cod})`;
  hint.style.color = '#166534';
}

function openManualesLista() {
  const lista = document.getElementById('manuales-lista-body');
  const manuales = (S.manuales || []).filter(m => m.type !== 'comment');
  if (!manuales.length) { lista.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px">Sin no catalogados aún.</p>'; }
  else {
    lista.innerHTML = manuales.map(m => {
      const factor = m.factor && m.factor !== 1 ? m.factor : null;
      const cantStr = factor
        ? `${m.cantidadRaw ?? m.cantidad} ${m.presentacion || 'uds'} = ${m.cantidad} ${m.uni}`
        : `${m.cantidad} ${m.uni}`;
      const fotoHtml = m.foto ? `<img src="${m.foto}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0">` : '';
      return `<div style="display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f1f5f9">
        ${fotoHtml}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(m.nombre)}</div>
          <div style="font-size:13px;color:#64748b">${esc(cantStr)} · ${esc(m.zona || '')}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">

          <button onclick="deleteManual('${m.id}')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:6px 10px;font-size:13px;font-weight:bold;cursor:pointer">${ic('trash-2',14)}</button>
        </div>

}

function deleteManual(id) {
  if (!confirm('¿Borrar este ítem?')) return;
  S.manuales = (S.manuales || []).filter(m => m.id !== id);
  lsSet('s', S);
  scheduleSyncSesion();
  updateManualesBadge();
  openManualesLista(); // refrescar lista
}

function updateManualesBadge() {
  const n = (S.manuales || []).filter(m => m.type !== 'comment').length;
  const btn = document.getElementById('btn-ver-manuales');
  const badge = document.getElementById('manuales-count-badge');
  if (btn) btn.style.display = n > 0 ? '' : 'none';
  if (badge) badge.textContent = n;
}

async function previewFoto(inp) {
  if (!inp.files[0]) return;
  const file = inp.files[0];
  const img  = new Image();
  img.onload = () => {
    const MAX = 800;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = img.width * scale; canvas.height = img.height * scale;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    _manFotoB64 = canvas.toDataURL('image/jpeg', 0.75);
    document.getElementById('man-foto-preview').innerHTML = `<img src="${_manFotoB64}" style="max-width:100%;border-radius:8px;margin-top:4px">`;
  };
  img.src = URL.createObjectURL(file);
}

function saveManual() {
  const nombre      = document.getElementById('man-nombre').value.trim();
  const cantidadRaw = parseFloat(document.getElementById('man-cantidad').value);
  const uni         = document.getElementById('man-unidad').value.trim();
  const hasPres     = document.getElementById('man-pres-toggle').checked;
  const factor      = hasPres ? parseFloat(document.getElementById('man-pres-factor').value) : 1;
  const presNombre  = hasPres ? document.getElementById('man-pres-nombre').value.trim() : '';
  const editId      = document.getElementById('man-edit-id').value;
  if (!nombre)            { alert('Ingresa el nombre'); return; }
  if (isNaN(cantidadRaw)) { alert('Ingresa la cantidad'); return; }
  if (hasPres && (isNaN(factor) || factor <= 0)) { alert('Ingresa un factor válido'); return; }
  const cantidad = parseFloat((cantidadRaw * (hasPres ? factor : 1)).toFixed(4));
  const templateItem = resolveTemplateItem(nombre);
  if (templateItem && CZ !== null) {
    const zid = myZoneKey(CZ);
    if (!S.countsByZone) S.countsByZone = {};
    if (!S.countsByZone[zid]) S.countsByZone[zid] = {};
    S.countsByZone[zid][templateItem.cod] = hasPres ? cantidadRaw : cantidad;
    if (hasPres) {
      if (!S.presChoiceByZone) S.presChoiceByZone = {};
      if (!S.presChoiceByZone[zid]) S.presChoiceByZone[zid] = {};
      S.presChoiceByZone[zid][templateItem.cod] = factor;
    }
    if (editId) S.manuales = (S.manuales || []).filter(m => m.id !== editId);
    markCorrection(zid, templateItem.cod, editId ? 'manual_convertido' : 'manual_a_plantilla');
    lsSet('s', S);
    syncSesionWorker();
    renderCountList(ZONAS[CZ].items, zid);
    filterCount(document.getElementById('count-search')?.value || '');
    updateProgress();
    updateManualesBadge();
    closeManualModal();
    return;
  }
  const zona = CZ !== null ? ZONAS[CZ].nombre : CFG.titulo;
  const manual = {
    id:           editId || newManualId(),
    nombre, cantidad, uni, zona,
    cantidadRaw:  hasPres ? cantidadRaw : undefined,
    factor:       hasPres ? factor : undefined,
    presentacion: hasPres ? presNombre : undefined,
    foto:         _manFotoB64 !== null ? _manFotoB64 : (editId ? (S.manuales||[]).find(m=>m.id===editId)?.foto || null : null),
    deviceId:     getDeviceId(),
    createdAt:    editId ? (S.manuales||[]).find(m=>m.id===editId)?.createdAt : new Date().toISOString(),
    updatedAt:    new Date().toISOString()
  };
  if (!S.manuales) S.manuales = [];
  if (editId) {
    const idx = S.manuales.findIndex(m => m.id === editId);
    if (idx >= 0) S.manuales[idx] = manual; else S.manuales.push(manual);
  } else {
    S.manuales.push(manual);
  }
  lsSet('s', S);
  scheduleSyncSesion();
  updateManualesBadge();
  closeManualModal();
  alert(editId ? '✓ Actualizado' : '✓ Guardado');
}

// ── Supervisor ─────────────────────────────────────────────────────────────

function renderSupBadge() {
  const wrap = document.getElementById('sup-badge-wrap');
  if (!wrap) return;
  if (_supervisorActual) {
    wrap.innerHTML = `<span class="sup-badge" onclick="logoutSupervisor()" title="Toca para cerrar sesión">${ic('lock',12)} ${esc(_supervisorActual.nombre)}</span>`;
  } else {
    wrap.innerHTML = `<span class="sup-badge" onclick="document.getElementById('modal-supervisor-login').classList.add('active')" title="Acceso supervisor">${ic('lock',12)} Supervisar</span>`;
  }
}

async function loginSupervisor() {
  const nombre = document.getElementById('sup-nombre').value.trim();
  const pin    = document.getElementById('sup-pin').value.trim();
  const errEl  = document.getElementById('sup-login-error');
  errEl.style.display = 'none';
  if (!nombre) { errEl.textContent = 'Escribe tu nombre'; errEl.style.display = ''; return; }
  if (!pin)    { errEl.textContent = 'Escribe el PIN'; errEl.style.display = ''; return; }
  try {
    const r = await fetch(WORKER_URL + '/inv/sesion', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'inv_supervisor_login', nombre, pin })
    });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error || 'PIN incorrecto'; errEl.style.display = ''; return; }
    _supervisorActual = d.usuario;
    localStorage.setItem('inv_supervisor', JSON.stringify(_supervisorActual));
    document.getElementById('modal-supervisor-login').classList.remove('active');
    document.getElementById('sup-pin').value = '';
    renderSupBadge();
    renderCountListIfActive();
  } catch(e) { errEl.textContent = 'Error de conexión'; errEl.style.display = ''; }
}

function logoutSupervisor() {
  if (!confirm('¿Cerrar sesión de supervisor?')) return;
  _supervisorActual = null;
  localStorage.removeItem('inv_supervisor');
  renderSupBadge();
  renderCountListIfActive();
}

function renderCountListIfActive() {
  if (CZ !== null && ZONAS?.[CZ]) renderCountList(ZONAS[CZ].items, myZoneKey(CZ));
}

// ── Comentarios de supervisor ───────────────────────────────────────────────

function getComment(cod) {
  return (S.manuales || []).find(m => m.type === 'comment' && m.cod === cod) || null;
}

function openCommentModal(cod, nombre) {
  if (!_supervisorActual) return;
  _commentTargetCod = cod;
  const existing = getComment(cod);
  document.getElementById('comment-modal-title').textContent = nombre;
  document.getElementById('comment-text').value = existing?.texto || '';
  const delBtn = document.getElementById('btn-delete-comment');
  delBtn.style.display = existing ? '' : 'none';
  document.getElementById('modal-comment').classList.add('active');
  setTimeout(() => document.getElementById('comment-text').focus(), 100);
}

function saveComment() {
  const texto = document.getElementById('comment-text').value.trim();
  const cod   = _commentTargetCod;
  if (!cod) return;
  if (!S.manuales) S.manuales = [];
  const idx = S.manuales.findIndex(m => m.type === 'comment' && m.cod === cod);
  if (texto) {
    const entry = { id: idx >= 0 ? S.manuales[idx].id : newManualId(),
      type: 'comment', cod, texto,
      supervisor: _supervisorActual.nombre, zona: CZ !== null ? ZONAS[CZ].nombre : '',
      ts: new Date().toISOString() };
    if (idx >= 0) S.manuales[idx] = entry; else S.manuales.push(entry);
  } else if (idx >= 0) {
    S.manuales.splice(idx, 1);
  }
  lsSet('s', S);
  scheduleSyncSesion();
  document.getElementById('modal-comment').classList.remove('active');
  _commentTargetCod = null;
  renderCountListIfActive();
  updateManualesBadge();
}

function deleteComment() {
  const cod = _commentTargetCod;
  if (!cod) return;
  S.manuales = (S.manuales || []).filter(m => !(m.type === 'comment' && m.cod === cod));
  lsSet('s', S);
  scheduleSyncSesion();
  document.getElementById('modal-comment').classList.remove('active');
  _commentTargetCod = null;
  renderCountListIfActive();
}

async function compartirManuales() {
  const lista = (S.manuales || []).filter(m => m.type !== 'comment');
  if (!lista.length) return;
  const texto = `📋 No catalogados · ${CFG.titulo} · ${S.fecha}\n\n` +
    lista.map(m => `• ${m.nombre} — ${m.cantidad} ${m.uni} (${m.zona})`).join('\n');
  if (navigator.share) {
    try { await navigator.share({ title: 'Inventario no catalogados', text: texto }); return; } catch(e) {}
  }
  try { await navigator.clipboard.writeText(texto); alert('Lista copiada al portapapeles'); } catch(e) { alert(texto); }
}

// ── Bootstrap ──────────────────────────────────────────────────────────────

document.getElementById('inp-fecha').value = new Date().toISOString().slice(0,10);
go('welcome');
</script>
